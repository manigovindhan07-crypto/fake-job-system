<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detector | AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 420px;
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            resize: none;
            outline: none;
            font-size: 14px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        #loading {
            margin-top: 15px;
            display: none;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Fake Job Detector</h2>

    <textarea id="jobText" placeholder="Paste job description here..."></textarea>

    <button onclick="checkFake()">Analyze Job</button>

    <div id="loading">⏳ Checking with AI...</div>
    <div id="result"></div>

    <div class="footer">
        Powered by Machine Learning
    </div>
</div>

<script>
function checkFake() {
    let text = document.getElementById("jobText").value;

    if(text.trim() === ""){
        alert("Please paste job description!");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerText = "";

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("loading").style.display = "none";
        let resultDiv = document.getElementById("result");
        resultDiv.innerText = data.result;

        if (data.result.includes("Fake")) {
            resultDiv.style.color = "#ff4d4d";
        } else {
            resultDiv.style.color = "#00ff99";
        }
    })
    .catch(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerText = "Server Error!";
        document.getElementById("result").style.color = "yellow";
    });
}
</script>

</body>
</html>
